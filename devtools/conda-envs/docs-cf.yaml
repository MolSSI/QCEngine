name: docs
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python
  - networkx
  - pydantic
  - pydantic-settings
  - numpy
  - pint

    # qc
  - qcelemental>=0.50.0

    # docs
  - python-graphviz
  - sphinx
  - sphinx-autodoc-typehints
  - sphinx-automodapi
  - sphinx_rtd_theme
  - autodoc-pydantic=2

    # testing
  - pytest
  - pytest-cov
  - codecov
  - pip
  #- pip:
  #   - git+https://github.com/MolSSI/qcarchive-sphinx-theme#egg=qcarchive_sphinx_theme
